# =============================================================================
#  WoWChatHardcore - Configuration File
#  https://github.com/ChakraaThePanda/WoWChatHardcore
# =============================================================================
#
#  QUICK START:
#    1. Fill in your Discord bot token (discord.token)
#    2. Fill in your WoW server details (wow section)
#    3. Set your Discord channel IDs for chat routing (chat section)
#    4. Enable/disable features with "enabled=true/false"
#
#  HOW TO GET IDs:
#    Discord Developer Mode must be enabled:
#    User Settings -> Advanced -> Developer Mode -> ON
#    Then right-click any channel, role, or user to copy its ID.
#
# =============================================================================


# =============================================================================
#  DISCORD
# =============================================================================

discord {
  # Your Discord bot token.
  # Create a bot at https://discord.com/developers/applications
  # Alternatively, set the DISCORD_TOKEN environment variable instead.
  token=${?DISCORD_TOKEN}

  # Allow WoW dot commands (e.g. .who, .online) to be triggered from Discord.
  enable_dot_commands=1

  # Restrict which dot commands are allowed. Leave empty to allow all.
  # Use exact command names without the dot. Wildcards like "lookup *" are supported.
  dot_commands_whitelist=[
    #"server info"
    #"lookup *"
  ]

  # Restrict which Discord channels can trigger dot commands.
  # Leave empty to allow all channels.
  enable_commands_channels=[
  ]

  # If a Discord @mention doesn't match any user, whisper the sender to let them know.
  enable_tag_failed_notifications=1

  # Item database used when WoW item links appear in chat.
  # Leave empty to use the default for your server version.
  # Vanilla:   http://classicdb.ch
  # TBC:       http://tbc-twinhead.twinstar.cz
  # WotLK:     http://wotlk-twinhead.twinstar.cz  (or https://www.wowhead.com/wotlk)
  # Cataclysm: http://cata-twinhead.twinstar.cz
  # MoP:       http://mop-shoot.tauri.hu
  item_database=""
  
  # How often to update Discord features (in minutes)
  # Affects: roster polling, role sync, inactivity checks
  # Minimum: 1 minute (default: 2)
  featuresUpdateMinutes = 2

  # Discord role IDs allowed to use privileged bot commands:
  # /ignore, /unignore, /ban, /unban, /profession add, /profession remove
  # Users without these roles cannot use the above commands.
  # Leave empty [] to restrict to bot owner only.
  commandRoleIds = ["REPLACE_WITH_DISCORD_ROLE_ID"]
}


# =============================================================================
#  WOW SERVER
# =============================================================================

wow {
  # IMPORTANT: Keep platform=Mac on servers with Warden (anti-cheat) enabled.
  # Windows Warden is not supported. Only use Windows if the server has no Warden.
  platform=Windows

  # Show the server's Message of the Day as a [SYSTEM] message in Discord.
  enable_server_motd=1

  # Your server connection details.
  version=1.12.1
  realmlist=your.realmlist.here
  realm="Your Realm Name"
  account=${?WOW_ACCOUNT}
  password=${?WOW_PASSWORD}
  character=${?WOW_CHARACTER}

  # --------------------------------------------------------------------------
  # Version reference:
  #   Vanilla:   version=1.12.1
  #   TBC:       version=2.4.3
  #   WotLK:     version=3.3.5
  #   Cataclysm: version=4.3.4
  #   MoP:       version=5.4.8
  # --------------------------------------------------------------------------
}


# =============================================================================
#  GUILD NOTIFICATIONS
#  Control which guild events are posted to Discord.
#  Set enabled=1 to turn on, enabled=0 to turn off.
#
#  Available tokens: %user, %target, %rank, %message, %time, %achievement
# =============================================================================

guild {
  online {
    enabled=0
    format="`[%user] has come online.`"
  }
  offline {
    enabled=0
    format="`[%user] has gone offline.`"
  }
  promoted {
    enabled=0
    format="`[%user] has promoted [%target] to [%rank].`"
  }
  demoted {
    enabled=0
    format="`[%user] has demoted [%target] to [%rank].`"
  }
  joined {
    enabled=1
    format="`[%user] has joined the guild.`"
  }
  left {
    enabled=1
    format="`[%user] has left the guild.`"
  }
  removed {
    enabled=1
    format="`[%target] has been kicked out of the guild by [%user].`"
  }
  motd {
    enabled=0
    format="`Guild Message of the Day: %message`"
  }
  achievement {
    enabled=1
    format="%user has earned the achievement %achievement!"
  }
}


# =============================================================================
#  CHAT ROUTING
#  Define which WoW chat channels are bridged to which Discord channels.
#
#  direction:
#    both            - messages flow in both directions
#    wow_to_discord  - WoW -> Discord only
#    discord_to_wow  - Discord -> WoW only
#
#  wow.type options:
#    Guild, Officer, Say, Yell, Emote, System, Channel, Whisper
#
#  discord.channel:
#    Use the numeric channel ID (right-click channel -> Copy Channel ID)
#    OR the channel name (e.g. "guild-chat") - ID is more reliable.
#
#  Available format tokens: %user, %message, %target (channel name for Channel type)
#
#  discord.show_discord_username:
#    true  (default) - Discord username is included when relaying to WoW
#                      e.g. [Chakraa]: hello
#    false           - Only the message is sent, no username prefix
#                      e.g. hello
# =============================================================================

chat {
  channels=[

    # Guild chat <-> Discord
    {
      direction=both
      wow {
        type=Guild
        format="[%user]: %message"
      }
      discord {
        channel=000000000000000000
        format="[%user]: %message"
        show_discord_username=true
      }
    }

    # Officer chat <-> Discord
    {
      direction=both
      wow {
        type=Officer
        format="[%user]: %message"
      }
      discord {
        channel=000000000000000000
        format="[%user]: %message"
        show_discord_username=true
      }
    }

    # /say -> Discord
    {
      direction=wow_to_discord
      wow {
        type=Say
        format="[%user]: %message"
      }
      discord {
        channel=000000000000000000
        format="[%user]: %message"
      }
    }

    # /yell -> Discord
    {
      direction=wow_to_discord
      wow {
        type=Yell
        format="[%user]: %message"
      }
      discord {
        channel=000000000000000000
        format="[%user]: %message"
      }
    }

    # /emote -> Discord
    {
      direction=wow_to_discord
      wow {
        type=Emote
        format="%user %message"
      }
      discord {
        channel=000000000000000000
        format="%user %message"
      }
    }

    # System messages -> Discord
    {
      direction=wow_to_discord
      wow {
        type=System
      }
      discord {
        channel=000000000000000000
        format="[SYSTEM]: %message"
      }
    }

    # Example: a specific in-game channel -> Discord
    # {
    #   direction=wow_to_discord
    #   wow {
    #     type=Channel
    #     channel="Trade - City"
    #     format="[%user]: %message"
    #   }
    #   discord {
    #     channel=000000000000000000
    #     format="[%target] [%user]: %message"
    #   }
    # }

  ]
}


# =============================================================================
#  MESSAGE FILTERS
#  Block specific messages from being relayed to Discord using Java regex patterns.
#  Set enabled=1 to activate filters, enabled=0 to disable all filtering.
# =============================================================================

filters {
  enabled=0
  patterns=[
    # Block gold/level/item spam
    ".*(?i)(?=.*g.?ld)(?=.*level)(?=.*item).*$"
    # Block messages with >> and << (common spam pattern)
    ".*(?=.*>>)(?=.*<<).*$"
  ]
}


# =============================================================================
#  GUILD ONLINE LIST
#  Posts and continuously updates a message in Discord showing which guild
#  members are currently online, with their level, class, and zone.
#
#  The bot character must be in the guild to use this feature.
#
#  DISCORD @MENTIONS:
#    Discord @mentions will appear next to character names IF AND ONLY IF:
#      1. The character has a Discord User ID in their note (officer or public,
#         depending on guildDiscordLinking.noteLocation)
#      2. For officer notes: the bot's WoW character must have a rank with
#         "View Officer Notes" permission, otherwise notes arrive as empty strings
#
#    Example output WITH a linked Discord ID:
#      "Symastic (Level 40 Warrior in Stranglethorn Vale) (<@123456789>)"
#
#    Example output WITHOUT a linked Discord ID:
#      "Symastic (Level 40 Warrior in Stranglethorn Vale)"
#
#  enabled    - Set to false to completely disable this feature
#  channelIds - List of Discord channel IDs where the message will be posted
#  ignore     - Character names to exclude from the list (e.g. your bot)
# =============================================================================
 
guildOnlineList {
  enabled = false
  channelIds = [000000000000000000]
  ignore = [""]
}


# =============================================================================
#  BOT STATUS ROTATION
#  The bot cycles through these messages as its Discord "Watching" status.
#
#  Available token:
#    {online-members} - shows member count with correct pluralization
#                       e.g. "1 Guild Member online" or "5 Guild Members online"
#
#  enabled       - Set to false to disable rotation and use default Discord status
#  messages      - List of status messages to cycle through
#  rotateSeconds - How often to change status (minimum: 5)
# =============================================================================

guildStatus {
  enabled = true
  messages = ["{online-members} online"]
  rotateSeconds = 30
}


# =============================================================================
#  DM AUTO-REPLY
#  When someone sends the bot a direct message, it automatically replies
#  with this text. Supports full Discord markdown.
#  Use triple quotes for multi-line messages.
#
#  enabled - Set to false to disable auto-replies
#  message - The text to send in response to DMs
# =============================================================================

dmAutoReply {
  enabled = false
  message = """
Hello!
If you wish to join us, you can click the link below to gain access to our **Discord** server.
## Link
[Discord Link](https://discord.gg/yourlink)
"""
}


# =============================================================================
#  GUILD DEATH ROLE PING
#  When a guild member dies (system message contains "has been slain by"),
#  the bot appends a role mention to the message in Discord.
#
#  enabled - Set to false to disable death pings
#  roleId  - The Discord role ID to ping
# =============================================================================

guildDeathNotifications {
  enabled = false
  # roleId = 000000000000000000
}


# =============================================================================
#  GUILD ENFORCEMENT
#  Automatically kicks guild members based on class or race.
#  Enforcement runs every featuresUpdateMinutes minutes (same cycle as the ban list).
#  Leave empty [] to disable.
#
#  banned_classes: Warrior, Paladin, Hunter, Rogue, Priest, Shaman, Mage, Warlock, Druid
#                  Death Knight (WotLK+), Monk (MoP+)
#
#  banned_races: Human, Orc, Dwarf, Night Elf, Undead, Tauren, Gnome, Troll
#                Blood Elf, Draenei (TBC+)
#                Goblin, Worgen (Cataclysm+)
#                Pandaren (MoP+)
#
#  Example: banned_classes = ["Death Knight", "Warlock"]
#  Example: banned_races = ["Goblin", "Gnome"]
# =============================================================================

guildEnforcement {
  banned_classes = []
  banned_races = []
}


# =============================================================================
#  AUTO GUILD INVITE
#  Automatically sends a guild invite when a trigger word is detected.
#  Works via whispers and/or custom in-game channels.
#
#  The bot character must have guild invite permissions.
#
#  enabled        - Set to false to completely disable auto-invites
#  triggers       - list of words to listen for (case-insensitive)
#  exactMatch     - true: message must exactly match a trigger
#                   false: message just needs to contain a trigger
#  whisperEnabled - listen for trigger words in whispers
#  channels       - list of in-game custom channel names to also listen in
# =============================================================================

autoGuildInvite {
  enabled = false
  # triggers = ["invite", "join"]
  # exactMatch = false
  # whisperEnabled = true
  # channels = ["recruitment"]
}


# =============================================================================
#  PROFESSION SYSTEM
#  Controls the /profession slash commands and profession data caching.
#  Commands work independently but cache is used by guild roster display.
#
#  cache          - Keeps profession data for characters who leave/rejoin quickly
#                   This allows the roster to display professions even after
#                   temporary guild departures
# =============================================================================

professions {
  cache {
    enabled = true
    graceHours = 1
  }
}


# =============================================================================
#  DISCORD ID LINKING & GUILD FEATURES
#  Master switch for all features that require Discord ID linking via officer notes.
#  When enabled, the bot polls the guild roster every featuresUpdateMinutes
#  to read officer notes and link characters to Discord users.
#
#  This controls:
#    - Guild roster embed (audit, stats, roster panels)
#    - Role sync (assigning Discord roles based on guild rank)
#    - Inactivity tracking (flagging inactive Discord users)
#    - Discord @mentions in Who's Online (when enabled separately)
#
#  IMPORTANT - PERFORMANCE:
#    When disabled, the bot does NOT poll the guild roster.
#    This is recommended for large guilds (1000+ members) if you don't need
#    Discord ID features. Who's Online will work via guild events instead.
#
#  enabled      - Master switch for ALL Discord ID features
#  noteLocation - Where to look for Discord IDs: "officer" or "public"
# =============================================================================

guildDiscordLinking {
  noteLocation = "officer"
  
  # ===========================================================================
  # GUILD ROSTER CHANNEL - 3-Embed System
  # Posts and continuously updates 3 embeds in a single Discord channel:
  #   1. Audit (top)    - Discord members with no character links + rank mismatches
  #   2. Stats (middle) - Race/class/profession/level distribution graphs
  #   3. Roster (bottom) - All guild members organized by Discord link status
  #
  # channelIds - One or more Discord channel IDs where all 3 embeds will be posted
  # ===========================================================================
  
  guildRoster {
    channelIds = [000000000000000000]
    
    # --- Audit Panel ---
    # Master switch for the Guild Sync Audit embed.
    # Controls 4 independently toggleable sub-modules (see below).
    audit {
      enabled = false

      # --- Sub-module: Unlinked Members ---
      # Scans Discord users in the listed roles and flags anyone who has no
      # linked in-game character (i.e. no Discord ID found in their guild note).
      # Useful for tracking members who haven't completed the linking step yet.
      unlinked {
        enabled = false

        # Discord role IDs to check. Any user with one of these roles but no
        # linked guild character will appear in this panel.
        roleIds = ["REPLACE_WITH_DISCORD_ROLE_ID"]
      }

      # --- Sub-module: Linked Rank Promotion ---
      # Characters at any of the listed in-game ranks who already have a Discord ID
      # in their guild note are shown here as promotion candidates — they've taken
      # the linking step and are ready to be moved to the next rank by an officer.
      # Supports multiple ranks: list all ranks whose linked members should be reviewed.
      linkedRankPromotion {
        enabled = false

        # In-game rank names to check (case-insensitive).
        # Characters at these ranks with a linked Discord ID will be flagged.
        ranksToCheck = ["Recruit"]
      }

      # --- Sub-module: Rank Mismatch ---
      # Flags Discord users whose linked characters hold different ranks
      # (e.g. main is "Officer" but an alt is still "Member").
      # Helps officers keep alt ranks consistent with their main.
      rankMismatch {
        enabled = false
      }

      # --- Sub-module: Promotion Due ---
      # Flags characters who have been sitting at their current rank for longer
      # than the configured number of days, signalling they may be overdue for
      # a promotion review.
      #
      # IMPORTANT — How timers work:
      #   The bot tracks rank changes over time in data/guild_rank_history.json.
      #   The WoW protocol (Vanilla/TBC/WotLK/Cataclysm) does NOT send guild join
      #   dates, so timers always begin from when the bot first sees a character
      #   at a given rank — not their actual join/promotion date. On the first run
      #   all members start fresh. Delete guild_rank_history.json to reset all timers.
      promotionDue {
        enabled = false

        # List of rank checks. Each entry needs:
        #   rank         - in-game rank name (case-insensitive)
        #   daysRequired - minimum days at that rank before flagging
        ranks = [
          { rank = "Recruit", daysRequired = 7  },
          { rank = "Member",  daysRequired = 30 }
        ]
      }
    }
    
    # --- Stats Panel ---
    # Shows race/class/profession/level distribution graphs
    stats {
      enabled = true
      
      # Individual stats block toggles (only apply when stats.enabled = true)
      # Set any to false to hide that specific stats block
      show_faction_distribution = true
      show_race_distribution = true
      show_class_distribution = true
      show_level_distribution = true
      show_professions = true
    }
    
    # --- Roster Panel ---
    # Shows all guild members grouped by Discord user
    roster {
      enabled = true
      showUnlinkedCharacters = true
    }
  }
  
  # ===========================================================================
  # INACTIVITY TRACKING
  # Automatically assigns a Discord role to users whose ALL characters are inactive
  # ===========================================================================
  
  inactivity {
    enabled = false
    
    # Number of days a character must be offline to be considered inactive
    # The bot checks ALL characters linked to each Discord user
    # Only if ALL characters are offline longer than this will the role be assigned
    inactiveDays = 30
    
    # Discord role ID to assign to inactive users
    # Users with audit.roleIds are checked - if all their characters are inactive,
    # this role is assigned. When they log back in, the role is removed.
    inactiveRoleId = "REPLACE_WITH_INACTIVE_ROLE_ID"
  }
  
  # ===========================================================================
  # ROLE SYNC
  # Automatically assigns Discord roles based on in-game guild rank
  # Syncs on startup and then every featuresUpdateMinutes minutes
  # ===========================================================================
  
  roleSync {
    enabled = false
    
    # Mapping of guild rank to Discord role
    # guildRank     - must match the in-game rank name (case-insensitive)
    # discordRoleId - right-click the role in Discord -> Copy Role ID
    ranks = [
      { guildRank = "Member",  discordRoleId = "REPLACE_WITH_DISCORD_ROLE_ID" },
      { guildRank = "Officer", discordRoleId = "REPLACE_WITH_DISCORD_ROLE_ID" }
    ]
  }
}


# =============================================================================
#  NOTES & TIPS
# =============================================================================
#
# TO DISABLE A FEATURE:
#   Set its "enabled" flag to false
#   Example: guildDiscordLinking.enabled = false
#
# NESTED FEATURES:
#   Disabling a parent disables all children
#   Example: guildDiscordLinking.enabled = false disables audit, stats, roster, role sync, and inactivity
#
# PERFORMANCE (LARGE GUILDS):
#   If you have 1000+ guild members and don't need Discord ID features:
#   Set guildDiscordLinking.enabled = false
#   This stops roster polling and saves significant resources
#
# DISCORD ID SETUP:
#   1. Enable Developer Mode in Discord settings
#   2. Right-click your username -> Copy User ID (18-19 digit number)
#   3. Put that number in your officer note in-game
#
# RATE LIMITS:
#   discord.featuresUpdateMinutes should not be less than 1
#   Too frequent updates may hit Discord rate limits
#
# SECURITY:
#   Keep this file secure - contains passwords and tokens
#   Never commit to public repositories
#
# =============================================================================
