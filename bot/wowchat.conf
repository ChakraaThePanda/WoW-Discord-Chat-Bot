# =============================================================================
#  WoWChatHardcore - Configuration File
#  https://github.com/ChakraaThePanda/WoWChatHardcore
# =============================================================================
#
#  QUICK START:
#    1. Fill in your Discord bot token (discord.token)
#    2. Fill in your WoW server details (wow section)
#    3. Set your Discord channel IDs for chat routing (chat section)
#    4. Enable/disable features with "enabled=true/false"
#
#  HOW TO GET IDs:
#    Discord Developer Mode must be enabled:
#    User Settings -> Advanced -> Developer Mode -> ON
#    Then right-click any channel, role, or user to copy its ID.
#
# =============================================================================


# =============================================================================
#  DISCORD
# =============================================================================

discord {
  # Your Discord bot token.
  # Create a bot at https://discord.com/developers/applications
  # Alternatively, set the DISCORD_TOKEN environment variable instead.
  token=${?DISCORD_TOKEN}

  # Allow WoW dot commands (e.g. .who, .online) to be triggered from Discord.
  enable_dot_commands=1

  # Restrict which dot commands are allowed. Leave empty to allow all.
  # Use exact command names without the dot. Wildcards like "lookup *" are supported.
  dot_commands_whitelist=[
    #"server info"
    #"lookup *"
  ]

  # Restrict which Discord channels can trigger dot commands.
  # Leave empty to allow all channels.
  enable_commands_channels=[
  ]

  # If a Discord @mention doesn't match any user, whisper the sender to let them know.
  enable_tag_failed_notifications=1

  # Item database used when WoW item links appear in chat.
  # Leave empty to use the default for your server version.
  # Vanilla:   http://classicdb.ch
  # TBC:       http://tbc-twinhead.twinstar.cz
  # WotLK:     http://wotlk-twinhead.twinstar.cz  (or https://www.wowhead.com/wotlk)
  # Cataclysm: http://cata-twinhead.twinstar.cz
  # MoP:       http://mop-shoot.tauri.hu
  item_database=""
}


# =============================================================================
#  WOW SERVER
# =============================================================================

wow {
  # IMPORTANT: Keep platform=Mac on servers with Warden (anti-cheat) enabled.
  # Windows Warden is not supported. Only use Windows if the server has no Warden.
  platform=Mac

  # Show the server's Message of the Day as a [SYSTEM] message in Discord.
  enable_server_motd=1

  # Your server connection details.
  version=1.12.1
  realmlist=your.realmlist.here
  realm="Your Realm Name"
  account=${?WOW_ACCOUNT}
  password=${?WOW_PASSWORD}
  character=${?WOW_CHARACTER}

  # --------------------------------------------------------------------------
  # Version reference:
  #   Vanilla:   version=1.12.1
  #   TBC:       version=2.4.3
  #   WotLK:     version=3.3.5
  #   Cataclysm: version=4.3.4
  #   MoP:       version=5.4.8
  # --------------------------------------------------------------------------
}


# =============================================================================
#  GUILD NOTIFICATIONS
#  Control which guild events are posted to Discord.
#  Set enabled=1 to turn on, enabled=0 to turn off.
#
#  Available tokens: %user, %target, %rank, %message, %time, %achievement
# =============================================================================

guild {
  online {
    enabled=0
    format="`[%user] has come online.`"
  }
  offline {
    enabled=0
    format="`[%user] has gone offline.`"
  }
  promoted {
    enabled=0
    format="`[%user] has promoted [%target] to [%rank].`"
  }
  demoted {
    enabled=0
    format="`[%user] has demoted [%target] to [%rank].`"
  }
  joined {
    enabled=1
    format="`[%user] has joined the guild.`"
  }
  left {
    enabled=1
    format="`[%user] has left the guild.`"
  }
  removed {
    enabled=1
    format="`[%target] has been kicked out of the guild by [%user].`"
  }
  motd {
    enabled=0
    format="`Guild Message of the Day: %message`"
  }
  achievement {
    enabled=1
    format="%user has earned the achievement %achievement!"
  }
}


# =============================================================================
#  CHAT ROUTING
#  Define which WoW chat channels are bridged to which Discord channels.
#
#  direction:
#    both            - messages flow in both directions
#    wow_to_discord  - WoW -> Discord only
#    discord_to_wow  - Discord -> WoW only
#
#  wow.type options:
#    Guild, Officer, Say, Yell, Emote, System, Channel, Whisper
#
#  discord.channel:
#    Use the numeric channel ID (right-click channel -> Copy Channel ID)
#    OR the channel name (e.g. "guild-chat") - ID is more reliable.
#
#  Available format tokens: %user, %message, %target (channel name for Channel type)
#
#  discord.show_discord_username:
#    true  (default) - Discord username is included when relaying to WoW
#                      e.g. [Chakraa]: hello
#    false           - Only the message is sent, no username prefix
#                      e.g. hello
# =============================================================================

chat {
  channels=[

    # Guild chat <-> Discord
    {
      direction=both
      wow {
        type=Guild
        format="[%user]: %message"
      }
      discord {
        channel=000000000000000000
        format="[%user]: %message"
        show_discord_username=true
      }
    }

    # Officer chat <-> Discord
    {
      direction=both
      wow {
        type=Officer
        format="[%user]: %message"
      }
      discord {
        channel=000000000000000000
        format="[%user]: %message"
        show_discord_username=true
      }
    }

    # /say -> Discord
    {
      direction=wow_to_discord
      wow {
        type=Say
        format="[%user]: %message"
      }
      discord {
        channel=000000000000000000
        format="[%user]: %message"
      }
    }

    # /yell -> Discord
    {
      direction=wow_to_discord
      wow {
        type=Yell
        format="[%user]: %message"
      }
      discord {
        channel=000000000000000000
        format="[%user]: %message"
      }
    }

    # /emote -> Discord
    {
      direction=wow_to_discord
      wow {
        type=Emote
        format="%user %message"
      }
      discord {
        channel=000000000000000000
        format="%user %message"
      }
    }

    # System messages -> Discord
    {
      direction=wow_to_discord
      wow {
        type=System
      }
      discord {
        channel=000000000000000000
        format="[SYSTEM]: %message"
      }
    }

    # Example: a specific in-game channel -> Discord
    # {
    #   direction=wow_to_discord
    #   wow {
    #     type=Channel
    #     channel="Trade - City"
    #     format="[%user]: %message"
    #   }
    #   discord {
    #     channel=000000000000000000
    #     format="[%target] [%user]: %message"
    #   }
    # }

  ]
}


# =============================================================================
#  MESSAGE FILTERS
#  Block specific messages from being relayed to Discord using Java regex patterns.
#  Set enabled=1 to activate filters, enabled=0 to disable all filtering.
# =============================================================================

filters {
  enabled=0
  patterns=[
    # Block gold/level/item spam
    ".*(?i)(?=.*g.?ld)(?=.*level)(?=.*item).*$"
    # Block messages with >> and << (common spam pattern)
    ".*(?=.*>>)(?=.*<<).*$"
  ]
}


# =============================================================================
#  DISCORD FEATURES - SHARED SETTINGS
# =============================================================================

# How often (in minutes) the bot refreshes guild data and syncs Discord features.
# Applies to: guild online list updates, guild role sync, guild roster/audit.
# Minimum: 1
discordFeaturesUpdateMinutes = 2


# =============================================================================
#  GUILD ONLINE LIST
#  Posts and continuously updates a message in a Discord channel showing
#  which guild members are currently online, with their level, class, and zone.
#
#  The bot character must be in the guild to use this feature.
#
#  enabled   - Set to false to completely disable this feature
#  channelId - Discord channel ID where the message will be posted
#  ignore    - Character names to exclude from the list (e.g. your bot)
# =============================================================================

guildOnlineList {
  enabled = true
  channelId = 000000000000000000
  ignore = [""]
}


# =============================================================================
#  BOT STATUS ROTATION
#  The bot cycles through these messages as its Discord "Watching" status.
#
#  Available token:
#    {online-members} - shows member count with correct pluralization
#                       e.g. "1 Guild Member online" or "5 Guild Members online"
#
#  enabled       - Set to false to disable rotation and use default Discord status
#  messages      - List of status messages to cycle through
#  rotateSeconds - How often to change status (minimum: 5)
# =============================================================================

guildStatus {
  enabled = true
  messages = ["{online-members} online"]
  rotateSeconds = 30
}


# =============================================================================
#  DM AUTO-REPLY
#  When someone sends the bot a direct message, it automatically replies
#  with this text. Supports full Discord markdown.
#  Use triple quotes for multi-line messages.
#
#  enabled - Set to false to disable auto-replies
#  message - The text to send in response to DMs
# =============================================================================

dmAutoReply {
  enabled = true
  message = """
Hello!
If you wish to join us, you can click the link below to gain access to our **Discord** server.
## Link
[Discord Link](https://discord.gg/yourlink)
"""
}


# =============================================================================
#  GUILD ROLE SYNC
#  Automatically assigns Discord roles to guild members based on their
#  in-game guild rank. The bot now ADDS and REMOVES roles dynamically.
#  Syncs on startup and then every discordFeaturesUpdateMinutes minutes.
#
#  HOW TO SET UP:
#    1. Promote your bot character to a rank that can read officer notes.
#    2. Have guild members put their Discord User ID in their officer note.
#       To get a User ID: Discord Settings -> Advanced -> Enable Developer Mode,
#       then right-click your username -> Copy User ID.
#    3. Add a mapping below for each rank you want to sync.
#       guildRank     - must match the in-game rank name (case-insensitive)
#       discordRoleId - right-click the role in Discord -> Copy Role ID
#
#  enabled - Set to false to completely disable role syncing
#  ranks   - List of guild rank to Discord role mappings
# =============================================================================

guildRoleSync {
  enabled = true
  ranks = [
    { guildRank = "Member",  discordRoleId = "REPLACE_WITH_DISCORD_ROLE_ID" },
    { guildRank = "Officer", discordRoleId = "REPLACE_WITH_DISCORD_ROLE_ID" }
  ]
}


# =============================================================================
#  GUILD DEATH ROLE PING
#  When a guild member dies (system message contains "has been slain by"),
#  the bot appends a role mention to the message in Discord.
#
#  enabled - Set to false to disable death pings
#  roleId  - The Discord role ID to ping
# =============================================================================

guildDeathNotifications {
  enabled = false
  # roleId = 000000000000000000
}


# =============================================================================
#  AUTO GUILD INVITE
#  Automatically sends a guild invite when a trigger word is detected.
#  Works via whispers and/or custom in-game channels.
#
#  The bot character must have guild invite permissions.
#
#  enabled        - Set to false to completely disable auto-invites
#  triggers       - list of words to listen for (case-insensitive)
#  exactMatch     - true: message must exactly match a trigger
#                   false: message just needs to contain a trigger
#  whisperEnabled - listen for trigger words in whispers
#  channels       - list of in-game custom channel names to also listen in
# =============================================================================

autoGuildInvite {
  enabled = false
  # triggers = ["invite", "join"]
  # exactMatch = false
  # whisperEnabled = true
  # channels = ["recruitment"]
}


# =============================================================================
#  PROFESSION SYSTEM
#  Controls the /profession slash commands and profession data caching.
#  Commands work independently but cache is used by guild roster display.
#
#  commandRoleIds - Discord role IDs allowed to manage ALL character professions
#                   Users without these roles can only manage their own linked characters
#                   Leave empty [] to allow only owners to manage their own
#
#  cache          - Keeps profession data for characters who leave/rejoin quickly
#                   This allows the roster to display professions even after
#                   temporary guild departures
# =============================================================================

professions {
  commandRoleIds = ["REPLACE_WITH_DISCORD_ROLE_ID"]
  
  cache {
    enabled = true
    graceHours = 1
  }
}


# =============================================================================
#  GUILD ROSTER & AUDIT SYSTEM
#  Posts and continuously updates Discord embeds in a single channel:
#    1. Audit (top)    - Discord members with no character links + rank mismatches
#    2. Stats (middle) - Race/class/profession/level distribution graphs
#    3. Roster (bottom) - All guild members organized by Discord link status
#
#  Linking works via officer notes: members put their Discord User ID
#  in their in-game officer note (18-19 digit number).
#
#  PARENT CONTROL:
#    guildRoster.enabled=false disables the ENTIRE system (audit, stats, roster)
#
#  CHILD CONTROLS:
#    Each sub-feature can be individually toggled when parent is enabled
# =============================================================================

guildRoster {
  # Master toggle - set to false to disable the entire system
  enabled = true
  
  # Discord channel where all embeds will be posted
  channelId = 000000000000000000
  
  # --- Audit Panel ---
  # Shows Discord members not linked to characters, and rank issues
  audit {
    enabled = true
    
    # Discord role IDs to check for unlinked members
    # Users with these roles but no linked characters will be flagged
    roleIds = ["REPLACE_WITH_DISCORD_ROLE_ID"]
    
    # Flag characters at this rank who have Discord IDs (should be promoted)
    # Example: Characters at "Member" rank with Discord links need promotion to "Discord Linked"
    # Set to "" to disable this check
    linkedRankToCheck = "Member"
  }
  
  # --- Stats Panel ---
  # Shows race/class/profession/level distribution graphs
  stats {
    enabled = false
  }
  
  # --- Inactivity Tracking ---
  # Automatically assigns a Discord role to users whose ALL characters are inactive
  inactivity {
    enabled = false
    
    # Number of days a character must be offline to be considered inactive
    # The bot checks ALL characters linked to each Discord user
    # Only if ALL characters are offline longer than this will the role be assigned
    inactiveDays = 30
    
    # Discord role ID to assign to inactive users
    # Users with audit.roleIds are checked - if all their characters are inactive,
    # this role is assigned. When they log back in, the role is removed.
    inactiveRoleId = "REPLACE_WITH_INACTIVE_ROLE_ID"
  }
}


# =============================================================================
#  NOTES & TIPS
# =============================================================================
#
# TO DISABLE A FEATURE:
#   Set its "enabled" flag to false
#   Example: guildRoster.enabled = false
#
# NESTED FEATURES:
#   Disabling a parent disables all children
#   Example: guildRoster.enabled = false disables audit, stats, and roster
#   Example: professions.cache.enabled = false disables only the cache
#
# RESOURCE SAVINGS:
#   Disabled features skip initialization, use no timers, make no API calls
#
# TO FIND DISCORD IDs:
#   Enable Developer Mode in Discord settings
#   Right-click channel/role/user -> Copy ID
#
# RATE LIMITS:
#   discordFeaturesUpdateMinutes should not be less than 1
#   Too frequent updates may hit Discord rate limits
#
# SECURITY:
#   Keep this file secure - contains passwords and tokens
#   Never commit to public repositories
#
# =============================================================================
